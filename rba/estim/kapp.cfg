[ProteinData]
file				= /path/to/data/proteomics.csv
file_type 		= csv
delimiter			= ;
skiprows			= 1
location_column		= Cellular_Location
count_column		= Condition-1
cdw					= 1

[FluxData]
file				= /path/to/data/flux.csv
file_type			= csv
delimiter			= ;
skiprows			= 1
ub_column			= UB
lb_column			= LB


[Model]
fba 				= /path/to/FBAmodel/fba_model.sbml
rba 				= /path/to/RBAmodel/
biomass_reaction	= R_Bio_opt


[Output]
kapp 				= /path/to/results/kapp_condition1.csv
fluxes 				= /path/to/results/fluxes_condition1.csv
file_type 			= csv
delimiter 			= ;
