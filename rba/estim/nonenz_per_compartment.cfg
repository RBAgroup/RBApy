[Experiment]
file				= /path/to/data/experiments.csv
growth_rate_column	= Growth rate
file_type			= csv
delimiter			= ;
skiprows			= 1

[ProteinData]
file				= /path/to/data/proteomics.csv
file_type 		= csv
delimiter			= ;
skiprows			= 1
location_column		= Cellular_Location


[LocationData]
file				= /path/to/data/proteomics.csv
file_type			= csv
delimiter			= ;
skiprows			= 1
location_column		= Cellular_Location

[CategoryData]
file				= /path/to/data/category_Pg.csv
file_type			= csv
delimiter			= ;
skiprows			= 1
cat_column			= Category

[CompartmentMap]
file 				= /path/to/data/compartment-map.csv
file_type 			= csv
delimiter			= ;
skiprows			= 1
cm_column			= USER ID

[IsEnzymaticData]
file				= /path/to/data/is_enzymatic_data.csv
file_type			= csv
skiprows			= 1
delimiter			= ;
is_enzymatic_column = EnzymaticData

[Output]
fits_file 			= /path/to/results/nonenz-protein-per-compartment-fit.tsv
compartment_file	= /path/to/results/nonenz-protein-per-compartment-compartment-summary.tsv
file_type 			= csv
delimiter 			= ;
